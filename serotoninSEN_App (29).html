<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>serotoninSEN — Système de gestion</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0d14'/%3E%3Cpolygon points='16,8 22,14 16,20 10,14' fill='%23f5a623'/%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0d14;
  --bg2: #111520;
  --bg3: #161b27;
  --card: #1a2035;
  --card2: #1f2840;
  --border: #2a3350;
  --accent: #f5a623;
  --accent2: #ff6b35;
  --blue: #3d8ef8;
  --green: #2ecc71;
  --red: #e74c3c;
  --purple: #9b59b6;
  --text: #e8ecf4;
  --text2: #8a94b0;
  --text3: #5a6480;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --glow: 0 0 24px rgba(245,166,35,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.login-wrap {
  width: 100%;
  max-width: 420px;
  padding: 24px;
  position: relative;
  z-index: 1;
}

.login-logo {
  text-align: center;
  margin-bottom: 36px;
}

.login-logo h1 {
  font-family: var(--font-head);
  font-size: 34px;
  font-weight: 800;
  color: var(--accent);
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
  font-weight: 600;
}

.form-group input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--text);
  font-size: 16px;
}

.form-group input:focus {
  outline: none;
  border-color: var(--accent);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all .2s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
}

.btn-secondary {
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-full {
  width: 100%;
  justify-content: center;
}

.error-msg {
  color: var(--red);
  font-size: 13px;
  margin-top: 8px;
  display: none;
}

#app {
  display: none;
  height: 100vh;
  flex-direction: column;
}

#app.active {
  display: flex;
}

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-logo {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 18px;
  color: var(--accent);
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar {
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text2);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  transition: all .2s;
}

.nav-item:hover {
  background: var(--card);
  color: var(--text);
}

.nav-item.active {
  color: var(--accent);
  background: rgba(245, 166, 35, 0.2);
}

.main {
  flex: 1;
  overflow-y: auto;
}

.content {
  padding: 24px;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

.page-header {
  margin-bottom: 28px;
}

.page-header h2 {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 800;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stat-label {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 10px;
}

.stat-value {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 800;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 540px;
}

.modal h3 {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
}

.modal-footer {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
}

#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 20px;
  font-size: 13px;
}

@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
  .content {
    padding: 12px;
  }
}
</style>
</head>
<body>

<div id="toast"></div>

<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <span style="font-size: 52px; display: block;">⚡</span>
      <h1>serotoninSEN</h1>
      <p style="color: var(--text2); font-size: 13px; margin-top: 6px;">Système de gestion intelligent</p>
    </div>
    <div class="login-card">
      <h2>Connexion</h2>
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" id="login-user" placeholder="Votre login" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
        <div class="error-msg" id="login-error">Identifiant ou mot de passe incorrect</div>
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Se connecter →</button>
    </div>
    <div style="text-align: center; margin-top: 20px; font-size: 11px; color: var(--text3);">
      serotoninSEN © 2025 · Version 1.0
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">⚡ serotoninSEN</div>
    <div class="topbar-right">
      <span id="user-name-display">Admin</span>
      <button class="btn btn-secondary" onclick="doLogout()" style="padding: 6px 14px; font-size: 12px;">⏻ Déconnexion</button>
    </div>
  </div>

  <div style="display: flex; flex: 1; overflow: hidden;">
    <div class="sidebar" id="sidebar">
      <div id="nav-menu" style="flex: 1;"></div>
    </div>

    <div class="main">
      <div class="content">
        <div id="page-dashboard" class="page"></div>
        <div id="page-clients" class="page"></div>
        <div id="page-chantiers" class="page"></div>
        <div id="page-parametres" class="page"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <h3 id="form-modal-title">Formulaire</h3>
    <div id="form-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeFormModal()">Annuler</button>
      <button class="btn btn-primary" id="form-modal-submit">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ── GLOBAL ERROR HANDLER ──
window.onerror = function(msg, src, line, col, err) {
  if (!msg || msg === 'Script error.') return true;
  console.error('[serotoninSEN]', msg, 'at', src, line+':'+col);
  return false;
};

// ── SAFE STORAGE ──
const _safeStorage = {
  _mem: {},
  getItem(k) { try { return localStorage.getItem(k); } catch(e) { return this._mem[k] ?? null; } },
  setItem(k, v) { try { localStorage.setItem(k, v); } catch(e) { this._mem[k] = v; } },
  removeItem(k) { try { localStorage.removeItem(k); } catch(e) { delete this._mem[k]; } }
};

// ── GLOBAL STATE ──
const STORAGE_KEY = 'seratonin_v21';
let STATE = loadState();
let currentUser = null;
let currentProject = null;
let currentPage = 'dashboard';

function defaultState() {
  return {
    projects: [{
      id: 'proj_seratonin',
      name: 'serotoninSEN',
      metier: 'Électricien',
      info: {
        nom: 'DIALLO ELECT',
        metier: 'Électricien qualifié',
        tel: '(+221) 77 576 17 24',
        adresse: 'Darou Salam, Tivaouane',
        email: 'dialloelect@gmail.com'
      },
      abonnement: {
        actif: true,
        type: 'proprietaire'
      }
    }],
    users: [{
      id: 'u_admin',
      login: 'admin',
      password: 'admin321',
      nom: 'Administrateur',
      role: 'admin',
      active: true,
      projects: ['proj_seratonin']
    }, {
      id: 'u_manager',
      login: 'manager',
      password: 'manager321',
      nom: 'Gestionnaire',
      role: 'manager',
      active: true,
      projects: ['proj_seratonin']
    }],
    projectData: {
      proj_seratonin: {
        clients: [],
        chantiers: [],
        paiements: [],
        ouvriers: []
      }
    }
  };
}

function loadState() {
  try {
    const s = _safeStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  _safeStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
}

// ── LOGIN ──
function doLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const foundUser = STATE.users.find(u => u.login === user && u.password === pass && u.active);
  
  if (!foundUser) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  
  currentUser = foundUser;
  currentProject = foundUser.projects[0];
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('user-name-display').textContent = foundUser.nom;
  
  renderNav();
  navigateTo('dashboard');
}

function doLogout() {
  currentUser = null;
  currentProject = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
}

// ── NAVIGATION ──
function renderNav() {
  const nav = document.getElementById('nav-menu');
  nav.innerHTML = `
    <button class="nav-item" onclick="navigateTo('dashboard')">📊 Tableau de bord</button>
    <button class="nav-item" onclick="navigateTo('clients')">👥 Clients</button>
    <button class="nav-item" onclick="navigateTo('chantiers')">🏗️ Chantiers</button>
    <button class="nav-item" onclick="navigateTo('parametres')">⚙️ Paramètres</button>
  `;
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.closest('.nav-item')?.classList.add('active');
  renderPage(page);
}

// ── PAGE RENDERING ──
function renderPage(page) {
  const pageEl = document.getElementById('page-' + page);
  
  if (page === 'dashboard') {
    renderDashboard(pageEl);
  } else if (page === 'clients') {
    renderClients(pageEl);
  } else if (page === 'chantiers') {
    renderChantiers(pageEl);
  } else if (page === 'parametres') {
    renderParametres(pageEl);
  }
}

function renderDashboard(el) {
  const data = STATE.projectData[currentProject];
  el.innerHTML = `
    <div class="page-header">
      <h2>Tableau de bord</h2>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Clients</div>
        <div class="stat-value">${data.clients.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Chantiers</div>
        <div class="stat-value">${data.chantiers.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ouvriers</div>
        <div class="stat-value">${data.ouvriers.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Paiements</div>
        <div class="stat-value">${data.paiements.length}</div>
      </div>
    </div>
  `;
}

function renderClients(el) {
  const data = STATE.projectData[currentProject];
  el.innerHTML = `
    <div class="page-header">
      <h2>Clients</h2>
      <button class="btn btn-primary" onclick="openAddClientModal()">➕ Nouveau client</button>
    </div>
    <div style="background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px;">
      ${data.clients.length === 0 ? '<p>Aucun client</p>' : '<p>' + data.clients.length + ' client(s)</p>'}
    </div>
  `;
}

function renderChantiers(el) {
  const data = STATE.projectData[currentProject];
  el.innerHTML = `
    <div class="page-header">
      <h2>Chantiers</h2>
      <button class="btn btn-primary" onclick="openAddChantiersModal()">➕ Nouveau chantier</button>
    </div>
    <div style="background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px;">
      ${data.chantiers.length === 0 ? '<p>Aucun chantier</p>' : '<p>' + data.chantiers.length + ' chantier(s)</p>'}
    </div>
  `;
}

function renderParametres(el) {
  el.innerHTML = `
    <div class="page-header">
      <h2>Paramètres</h2>
    </div>
    <div style="background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px;">
      <h3>Projet actuel</h3>
      <p>${STATE.projects.find(p => p.id === currentProject).name}</p>
      <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
      <h3>Informations de l'utilisateur</h3>
      <p>Nom: ${currentUser.nom}</p>
      <p>Rôle: ${currentUser.role}</p>
    </div>
  `;
}

// ── MODALS ──
function openAddClientModal() {
  const modal = document.getElementById('form-modal');
  document.getElementById('form-modal-title').textContent = 'Nouveau client';
  document.getElementById('form-modal-body').innerHTML = `
    <div class="form-group">
      <label>Nom</label>
      <input type="text" id="client-nom" placeholder="Nom du client"/>
    </div>
    <div class="form-group">
      <label>Téléphone</label>
      <input type="tel" id="client-tel" placeholder="Téléphone"/>
    </div>
  `;
  modal.classList.add('open');
  
  document.getElementById('form-modal-submit').onclick = function() {
    const nom = document.getElementById('client-nom').value;
    const tel = document.getElementById('client-tel').value;
    if (!nom) {
      showToast('Veuillez entrer un nom', 'error');
      return;
    }
    STATE.projectData[currentProject].clients.push({
      id: 'c_' + Date.now(),
      nom,
      tel,
      createdAt: new Date().toISOString()
    });
    saveState();
    renderPage('clients');
    closeFormModal();
    showToast('Client ajouté', 'success');
  };
}

function openAddChantiersModal() {
  const modal = document.getElementById('form-modal');
  document.getElementById('form-modal-title').textContent = 'Nouveau chantier';
  document.getElementById('form-modal-body').innerHTML = `
    <div class="form-group">
      <label>Nom du chantier</label>
      <input type="text" id="chantier-nom" placeholder="Nom"/>
    </div>
    <div class="form-group">
      <label>Adresse</label>
      <input type="text" id="chantier-adresse" placeholder="Adresse"/>
    </div>
  `;
  modal.classList.add('open');
  
  document.getElementById('form-modal-submit').onclick = function() {
    const nom = document.getElementById('chantier-nom').value;
    const adresse = document.getElementById('chantier-adresse').value;
    if (!nom) {
      showToast('Veuillez entrer un nom', 'error');
      return;
    }
    STATE.projectData[currentProject].chantiers.push({
      id: 'ch_' + Date.now(),
      nom,
      adresse,
      createdAt: new Date().toISOString()
    });
    saveState();
    renderPage('chantiers');
    closeFormModal();
    showToast('Chantier ajouté', 'success');
  };
}

function closeFormModal() {
  document.getElementById('form-modal').classList.remove('open');
}

// ── TOAST ──
function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.textContent = msg;
  toast.appendChild(item);
  setTimeout(() => item.remove(), 3000);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function() {
  console.log('SerotoninSEN app initialized');
});
</script>

</body>
</html>
